Tmux:
  Enabled: true
Shell:
  Default:
    - murex
  Fallback:
    - $SHELL
Hotkeys:
  PrefixTTL: 2000
  RepeatTTL: 1000
  Functions:
    F2::s: Settings
    F2::C-r: ReloadSettings
    M-v: Paste
    C-S-v: Paste
    F2::v: VisualEditor
    F2::a: AskAI
    F2::/: AgentSkills
    F2::n: ShowHideNotes
    M-f: SearchRegex
    F3::F3: SearchRegex
    F3::d: SearchResults
    F3::c: SearchClear
    F3::h: SearchCommandLines
Terminal:
  ScrollbackHistory: 10000
  WriteMarkdownHistory: true
  ScrollbackCloseKeyPress: true
  JumpScrollLineCount: -1
  AutoHyperlink: true
  Widgets:
    AutoHyperlink:
      IncLineNumbers: false
      OpenAgents:
        - Name: Visual Studio Code
          Command:
            - code
            - ${path}
          Schemes:
            - file
        - Name: System Default
          Command:
            - open
            - ${url}
          Schemes:
            - "*"
        - Name: Zed
          Command:
            - zed
            - ${path}
          Schemes:
            - file
        - Name: Mozilla FireFox
          Command:
            - firefox
            - ${url}
          Schemes:
            - "*"
        - Name: Google Chrome
          Command:
            - chrome
            - ${url}
          Schemes:
            - "*"
        - Name: Chromium
          Command:
            - chromium
            - ${url}
          Schemes:
            - "*"
    Table:
      ScrollMultiplierX: 2
      ScrollMultiplierY: 2
TypeFace:
  FontSize: 15
  AdjustCellWidth: 0
  AdjustCellHeight: 2
  Ligatures: true
Window:
  StatusBar: true
  HoverEffectHighlight: true
  BellVisualNotification: false
  BellPlayAudio: true
NotesWindow: null
AI:
  MaxIterations: 10
  AvailableModels:
    ChatGPT:
      - gpt-5.2
      - gpt-5-mini
      - gpt-5-nano
    Claude:
      - claude-opus-4-5
      - claude-sonnet-4-5
      - claude-haiku-4-5
