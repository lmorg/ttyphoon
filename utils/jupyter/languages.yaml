- Aliases: [ go, golang ]
  Description: Go (Golang)
  Template: |-
    {{ if begins "package" }}
    {{ .Code }}
    {{ else }}
    package main

    func main() {
    {{ .Code }}
    }
    {{ end }}
  FileExtension: go
  PreRunCommand: [ goimports, -w, "${FILE}" ]
  ExecuteCommand: [ go, run, "${FILE}" ]

